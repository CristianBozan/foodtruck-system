<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Food Truck</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card-login { width: 100%; max-width: 380px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .card-header { background: #0f3460; border-radius: 12px 12px 0 0 !important; text-align: center; padding: 28px; }
    .card-header h4 { color: #fff; margin: 0; font-weight: 700; letter-spacing: 1px; }
    .card-header p { color: rgba(255,255,255,0.7); margin: 4px 0 0; font-size: 13px; }
    #msgErro { display: none; }
    .btn-entrar { background: #0f3460; border: none; }
    .btn-entrar:hover { background: #16213e; }
  </style>
</head>
<body>
  <div class="card card-login">
    <div class="card-header">
      <h4>🍔 Food Truck</h4>
      <p>Sistema de Gestão</p>
    </div>
    <div class="card-body p-4">
      <div id="msgErro" class="alert alert-danger py-2 text-center"></div>
      <form id="formLogin">
        <div class="mb-3">
          <label class="form-label fw-semibold">Login</label>
          <input type="text" id="login" class="form-control" placeholder="Seu login" required autocomplete="username">
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Senha</label>
          <input type="password" id="senha" class="form-control" placeholder="Sua senha" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-entrar btn-primary w-100" id="btnEntrar">Entrar</button>
      </form>
    </div>
  </div>

  <script>
    // Se já está autenticado, vai direto pro dashboard
    if (localStorage.getItem('ft_token')) {
      window.location.href = 'index.html';
    }

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn  = document.getElementById('btnEntrar');
      const erro = document.getElementById('msgErro');
      erro.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      const login = document.getElementById('login').value.trim();
      const senha = document.getElementById('senha').value;

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, senha })
        });

        const data = await res.json();

        if (!res.ok) {
          erro.textContent = data.error || 'Credenciais inválidas.';
          erro.style.display = 'block';
          return;
        }

        localStorage.setItem('ft_token', data.token);
        localStorage.setItem('ft_user', JSON.stringify({ tipo_usuario: data.tipo_usuario, nome: data.nome }));
        window.location.href = 'index.html';

      } catch {
        erro.textContent = 'Erro de conexão com o servidor.';
        erro.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
