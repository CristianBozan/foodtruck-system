<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Food Truck</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .chart-card { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
    .stat-card { border-radius: 10px; padding: 20px 24px; color: #fff; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; }
    .stat-card .label { font-size: 0.85rem; opacity: 0.85; }
  </style>
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">🍔 Food Truck</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link active" href="index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="produtos.html">Produtos</a></li>
          <li class="nav-item"><a class="nav-link" href="pedidos.html">Pedidos</a></li>
          <li class="nav-item"><a class="nav-link" href="relatorios.html">Relatórios</a></li>
        </ul>
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item me-3"><span class="text-light opacity-75" id="nomeUsuario"></span></li>
          <li class="nav-item"><button class="btn btn-outline-light btn-sm" onclick="logout()">Sair</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <h4 class="mb-4 fw-bold text-dark">📊 Dashboard</h4>

    <!-- Cards de resumo -->
    <div class="row g-3 mb-4" id="cardsResumo">
      <div class="col-md-4">
        <div class="stat-card bg-success">
          <div class="value" id="faturamento">—</div>
          <div class="label">Faturamento Total</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card bg-primary">
          <div class="value" id="qtdVendas">—</div>
          <div class="label">Total de Vendas</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card bg-warning">
          <div class="value" id="ticketMedio">—</div>
          <div class="label">Ticket Médio</div>
        </div>
      </div>
    </div>

    <!-- Gráficos -->
    <div class="row g-3">
      <div class="col-lg-8">
        <div class="chart-card">
          <h6 class="fw-bold mb-3">Faturamento por Dia</h6>
          <canvas id="chartVendasDia" height="100"></canvas>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="chart-card">
          <h6 class="fw-bold mb-3">Formas de Pagamento</h6>
          <canvas id="chartPagamento" height="180"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
