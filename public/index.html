<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Food Truck</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
    h1 { text-align: center; margin-bottom: 40px; }
    .chart-container { width: 600px; margin: 30px auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <h1>📊 Relatórios de Vendas</h1>

  <div class="chart-container">
    <h3>Faturamento por Dia</h3>
    <canvas id="chartVendasDia"></canvas>
  </div>

  <div class="chart-container">
    <h3>Vendas por Forma de Pagamento</h3>
    <canvas id="chartPagamento"></canvas>
  </div>

  <div class="chart-container">
    <h3>Resumo Geral</h3>
    <ul id="resumo"></ul>
  </div>

  <!-- Importa o JS separado -->
  <script src="script.js"></script>
</body>
</html>
